<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملتقى الهوايات الإبداعي</title>
    <style>
        /* تصميم الخلفية الاحترافي */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            scroll-behavior: smooth;
        }

        /* قائمة التنقل الزجاجية */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #00d2ff; }

        /* الأقسام الإبداعية */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            margin-bottom: 10px;
        }

        .card-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        /* كروت بتأثير احترافي */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s;
            width: 200px;
        }

        .glass-card:hover {
            transform: translateY(-20px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid #00d2ff;
        }

        button {
            background: #00d2ff;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: #0f2027;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.1); box-shadow: 0 0 20px #00d2ff; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">البداية</a>
        <a href="#projects">أعمالي</a>
        <a href="#contact">تواصل</a>
    </nav>

    <section id="home">
        <h1>عالم من الإبداع</h1>
        <p>مرحباً بك في المنصة التي تجمع الفن بالتقنية</p>
        <button onclick="location.href='#projects'">اكتشف المزيد</button>
    </section>

    <section id="projects">
        <h2>مشاريع لا تخطر على البال</h2>
        <div class="card-container">
            <div class="glass-card">
                <h3>تصميم UI</h3>
                <p>لمسة فنية فريدة</p>
            </div>
            <div class="glass-card">
                <h3>تطوير الويب</h3>
                <p>أكواد ذكية وسريعة</p>
            </div>
        </div>
    </section>

</body>
</html>
