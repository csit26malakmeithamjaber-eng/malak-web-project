<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malak Myth | Tech Portfolio</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0a0a0a;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
        }
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            text-align: center;
        }
        .hero-title {
            font-size: 4rem;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            margin-bottom: 10px;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 50px;
        }
        .skill-card {
            background: #161616;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            text-align: center;
            transition: 0.3s;
        }
        .skill-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 15px var(--primary);
        }
        .btn {
            padding: 12px 30px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="hero-title">Malak Myth | Tech</h1>
        <p>طالبة هندسة تكنولوجيا المعلومات - جامعة كربلاء</p>
        <a href="#projects" class="btn">مشاهدة المشاريع</a>
    </header>

    <section id="skills">
        <h2 style="text-align: center; margin-top: 40px;">المهارات التقنية</h2>
        <div class="skills-grid">
            <div class="skill-card"><h3>C++</h3><p>برمجة النظم والهياكل</p></div>
            <div class="skill-card"><h3>Python</h3><p>تطوير واجهات Flet</p></div>
            <div class="skill-card"><h3>UI/UX</h3><p>Canva & Illustrator</p></div>
        </div>
    </section>
</body>
</html>
